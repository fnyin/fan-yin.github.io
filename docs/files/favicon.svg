<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 120">
  <defs>
    <clipPath id="grillClip">
      <circle cx="50" cy="46" r="40"/>
    </clipPath>
    <radialGradient id="hubGrad" cx="40%" cy="35%" r="60%">
      <stop offset="0%" stop-color="#f5f5f5"/>
      <stop offset="100%" stop-color="#b0b0b0"/>
    </radialGradient>
    <linearGradient id="standGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#c0c0c0"/>
      <stop offset="45%" stop-color="#ebebeb"/>
      <stop offset="100%" stop-color="#c0c0c0"/>
    </linearGradient>
    <radialGradient id="baseGrad" cx="50%" cy="30%" r="70%">
      <stop offset="0%" stop-color="#e8e8e8"/>
      <stop offset="100%" stop-color="#b0b0b0"/>
    </radialGradient>
  </defs>

  <!-- Base dome -->
  <ellipse cx="50" cy="110" rx="23" ry="8" fill="url(#baseGrad)" stroke="#aaa" stroke-width="0.8"/>
  <ellipse cx="50" cy="107" rx="20" ry="6" fill="#e0e0e0"/>

  <!-- Stand neck -->
  <path d="M45 88 Q43 98 44 107 L56 107 Q57 98 55 88 Z" fill="url(#standGrad)" stroke="#b0b0b0" stroke-width="0.5"/>

  <!-- Fan housing outer rim -->
  <circle cx="50" cy="46" r="44" fill="#d0d0d0" stroke="#aaa" stroke-width="1"/>

  <!-- Grille background -->
  <circle cx="50" cy="46" r="40" fill="#f0f0f0"/>

  <!-- Fan blades (subtle, behind grille) -->
  <g clip-path="url(#grillClip)" opacity="0.35">
    <path d="M50 46 C48 33 40 10 50 3 C62 -4 66 26 50 46Z" fill="#909090"/>
    <path d="M50 46 C63 44 86 36 90 48 C94 62 68 70 50 46Z" fill="#909090"/>
    <path d="M50 46 C54 59 60 82 50 88 C38 94 30 70 50 46Z" fill="#909090"/>
    <path d="M50 46 C37 48 14 56 10 44 C6 30 32 22 50 46Z" fill="#909090"/>
    <path d="M50 46 C46 33 44 10 54 6 C64 0 68 28 50 46Z" fill="#808080"/>
  </g>

  <!-- Grille: concentric rings -->
  <g clip-path="url(#grillClip)" fill="none" stroke="#b8b8b8" stroke-width="1.3">
    <circle cx="50" cy="46" r="8"/>
    <circle cx="50" cy="46" r="16"/>
    <circle cx="50" cy="46" r="24"/>
    <circle cx="50" cy="46" r="32"/>
    <circle cx="50" cy="46" r="40"/>
  </g>

  <!-- Grille: radial spokes (8 full lines = 16 spokes) -->
  <g clip-path="url(#grillClip)" stroke="#b8b8b8" stroke-width="1.3">
    <!-- 0° / 180° -->
    <line x1="10" y1="46" x2="90" y2="46"/>
    <!-- 90° / 270° -->
    <line x1="50" y1="6" x2="50" y2="86"/>
    <!-- 45° / 225° -->
    <line x1="21.7" y1="17.7" x2="78.3" y2="74.3"/>
    <!-- 135° / 315° -->
    <line x1="78.3" y1="17.7" x2="21.7" y2="74.3"/>
    <!-- 22.5° / 202.5° -->
    <line x1="13" y1="31" x2="87" y2="61"/>
    <!-- 157.5° / 337.5° -->
    <line x1="87" y1="31" x2="13" y2="61"/>
    <!-- 67.5° / 247.5° -->
    <line x1="35" y1="9" x2="65" y2="83"/>
    <!-- 112.5° / 292.5° -->
    <line x1="65" y1="9" x2="35" y2="83"/>
  </g>

  <!-- Outer rim border on top -->
  <circle cx="50" cy="46" r="44" fill="none" stroke="#aaa" stroke-width="1.5"/>
  <circle cx="50" cy="46" r="40" fill="none" stroke="#b8b8b8" stroke-width="1"/>

  <!-- Center hub -->
  <circle cx="50" cy="46" r="11" fill="url(#hubGrad)" stroke="#a0a0a0" stroke-width="1"/>
  <circle cx="50" cy="46" r="6" fill="white" opacity="0.85"/>
  <circle cx="50" cy="46" r="2.5" fill="#a0a0a0"/>
</svg>
